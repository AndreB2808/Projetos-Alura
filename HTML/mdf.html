<meta charset="UTF-8">

<script>

    function pulaLinha() {

    	document.write("<br><br>")

    }

    function mostra(vaca) {

    	document.write(vaca);
		pulaLinha();
    }

    var totalF = parseInt(prompt("Quandidade de familiares?"));

    var numero = 1;

    var = totalI = 0;

    while(numero <= totalF) {
        var age = parseInt(prompt("Informe idade do familiar:"));
        totalI = totalI + age;
        numero++;
    }

    var media = totalI/totalF
    mostra("A média das idades dos familiares é " + media + ".")

    mostra("END");

</script>
