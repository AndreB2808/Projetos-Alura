<meta charset="UTF-8">

<script>

    function pulaLinha() {

    	document.write("<br><br>")

    }

    function mostra(vaca) {

    	document.write(vaca);
		pulaLinha();
    }


    var wins = parseInt(prompt("Entre com o número de vitórias."));
    var ties = parseInt(prompt("Entre com o número de empates."));

    var pontos = wins * 3 + ties;

    mostra("Os pontos do seu time é " + pontos);

    if(pontos > 28) {
    mostra("Seu time está melhor do que o ano passado.");
	}
    if(pontos < 28) {
    mostra("Seu time está pior do que o ano passado.");
	}
    if(pontos == 28) {
    mostra("Seu time está igual ao ano passado.");
	}

	mostra("END")
</script>
